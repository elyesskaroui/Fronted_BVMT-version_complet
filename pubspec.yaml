name: bvmt
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management - BLoC
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Network
  dio: ^5.9.2
  web_socket_channel: ^2.4.0
  url_launcher: ^6.2.5

  # Local Storage
  get_storage: ^2.1.1

  # Charts
  fl_chart: ^0.68.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  marquee: ^2.2.3
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0

  # Localisation
  flutter_localizations:
    sdk: flutter
  open_file: ^3.5.11
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_pdfview: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.8
  bloc_test: ^9.1.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/BVMT.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/BVMT.png"

flutter:
  generate: true


  uses-material-design: true

  assets:
    - assets/images/BVMT.png
    - assets/icons/
    - assets/svg/

 
